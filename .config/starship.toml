# Minimal prompt (adapted from kunchenguid/dotfiles), plus python/conda env display
add_newline = false
format = "$directory$git_branch$git_status$python$conda$cmd_duration$line_break$character"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"

[cmd_duration]
format = "[$duration]($style) "
